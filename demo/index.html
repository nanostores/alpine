<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nano Stores Alpine — Demo</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 600px;
        margin: 2rem auto;
        padding: 0 1rem;
      }
      section {
        border: 1px solid #ddd;
        border-radius: 6px;
        padding: 1rem 1.5rem;
        margin-bottom: 1.5rem;
      }
      h2 {
        margin-top: 0;
      }
      button {
        margin-right: 0.5rem;
        padding: 0.25rem 0.75rem;
        cursor: pointer;
      }
      input {
        padding: 0.25rem 0.5rem;
        margin-right: 0.5rem;
      }
      pre {
        background: #f5f5f5;
        padding: 0.5rem;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <h1>Nano Stores Alpine — Demo</h1>

    <!-- Counter: x-nano + atom -->
    <section>
      <h2>Counter (<code>x-nano</code> + <code>atom</code>)</h2>
      <div x-data x-nano:count="$counter">
        <p>Count: <strong x-text="count"></strong></p>
        <button @click="$counter.set(count - 1)">−</button>
        <button @click="$counter.set(count + 1)">+</button>
        <button @click="$counter.set(0)">Reset</button>
      </div>
    </section>

    <!-- Profile: x-nano + map + mutation -->
    <section>
      <h2>Profile (<code>x-nano</code> + <code>map</code>)</h2>
      <div x-data x-nano:profile="$profile">
        <p>Name: <strong x-text="profile.name"></strong></p>
        <p>Role: <strong x-text="profile.role"></strong></p>
        <button @click="$profile.setKey('role', 'admin')">Make Admin</button>
        <button @click="$profile.setKey('role', 'user')">Make User</button>
      </div>
    </section>

    <!-- Two-way binding: x-nano-model -->
    <section>
      <h2>Two-way Binding (<code>x-nano-model</code>)</h2>
      <div x-data x-nano-model:name="$username">
        <input x-model="name" placeholder="Type your name…" />
        <p>Hello, <strong x-text="name || 'stranger'"></strong>!</p>
      </div>
    </section>

    <!-- Cart: $nano magic inline -->
    <section>
      <h2>Cart (<code>$nano</code> magic)</h2>
      <div x-data>
        <p x-show="$nano($cart).length === 0">Cart is empty.</p>
        <ul x-show="$nano($cart).length > 0">
          <template x-for="item in $nano($cart)" :key="item">
            <li x-text="item"></li>
          </template>
        </ul>
        <button @click="$cart.set([...$nano($cart), 'Item ' + ($nano($cart).length + 1)])">
          Add item
        </button>
        <button @click="$cart.set([])">Clear cart</button>
      </div>
    </section>

    <!-- withStores: Alpine.data component -->
    <section>
      <h2>Dashboard (<code>withStores</code>)</h2>
      <div x-data="dashboard">
        <p>Total clicks: <strong x-text="total"></strong></p>
        <p>Last action: <strong x-text="lastAction || '—'"></strong></p>
        <button @click="click('A')">Click A</button>
        <button @click="click('B')">Click B</button>
        <button @click="reset()">Reset</button>
      </div>
    </section>

    <script type="module" src="./main.js"></script>
  </body>
</html>
